<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Hotel Centrum Prizren</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f5ef;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
        }
        
        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #955013;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        
        .checkmark svg {
            width: 40px;
            height: 40px;
        }
        
        h1 {
            font-size: 42px;
            color: #955013;
            margin-bottom: 20px;
            font-weight: 300;
        }
        
        p {
            font-size: 18px;
            color: #5c5c5c;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background-color: #955013;
            color: white;
            text-decoration: none;
            font-size: 16px;
            border-radius: 4px;
            transition: opacity 0.3s;
        }
        
        .button:hover {
            opacity: 0.8;
        }
        
        .auto-redirect {
            margin-top: 30px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 13l4 4L19 7" stroke="#955013" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        
        <h1>Request Received!</h1>
        
        <p>Thank you for your booking request at Hotel Centrum Prizren.</p>
        <p>We have received your information and will get back to you shortly to confirm your reservation.</p>
        
        <a href="index.html" class="button">Return to Home</a>
        
        <p class="auto-redirect">Redirecting in <span id="countdown">5</span> seconds...</p>
    </div>
    
    <script>
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
